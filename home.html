    <title>Home</title>

    <link rel="shortcut icon" href="assets/images/exempleIcon.png"> 
    <!--External Stylesheet-->
    <link rel="stylesheet" href="style.css">

    <!--google fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Xanh+Mono:ital@0;1&display=swap" rel="stylesheet">

<!-- Make a French/English Version Version -->
<body>
    <div id="wrapper">
        <header>
            <!--Navigation-->
            <nav>
                <div class="logo">
                    <a href="home.html"><img src="assets/images/exempleIcon.png" alt="Silica" ></a>
                </div>
                <div class="logoText">
                    <h1>Silica</h1>
                </div>
                <div class="menu1">
                    <button class="close-menu">&times;</button>

                    <a href="home.html" class="menuI_active">HOME</a>
                    <a href="about.html" class="menuI">ABOUT</a>
                    <a href="catalogue.html" class="menuI">CATALOGUE</a>
                    
                </div>
                <!-- Hamburger menu button for mobile version-->
                <div class="hamburger-menu">
                    <button>
                        <span class="fa fa-bars"></span>
                    </button>

                </div>
            </nav>
        </header>
        <main>
            <div id="highlight">
                    <!-- Where i want to rotate the pictures -->
                    <div class="highlightRotation">
                        <img src="assets/images/Capture2.PNG" alt="art" >
                    </div>
            </div>
            <div class="homeMain">
                <h2><span>Jewlery</h2>
                    <p><span>Silica means... I create wearable art...</span></p>
                    <img src="assets/images/Capture1.PNG" alt="art" >

            </div>
        </main>

    <!--Footer-->
    <footer>
        <div class="social">

            <!--Social Media Icons-->
            <div class="icons-wrapper">
                <p>Contact</p> <br>
                <span> telephone</span>

        <!-- <small><em>This website was created as part of a student project. All content and design are copyright me,
                student, 2025</em></small> -->
    </footer>

    </div>
    <!--script for the hamburger menu -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const hamburgerButton = document.querySelector('.hamburger-menu button');
            const closeButton = document.querySelector('.close-menu');
            const menu1 = document.querySelector('.menu1');

            // Gestion de l'ouverture du menu
            hamburgerButton.addEventListener('click', () => {
                menu1.classList.add('menu-deployed');
            });

            // Gestion de la fermeture du menu
            closeButton.addEventListener('click', () => {
                menu1.classList.remove('menu-deployed');
            });
        });
    </script>

</body>
